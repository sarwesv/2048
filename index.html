<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="2048" />
  <meta name="theme-color" content="#0d0d1a" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>2048</h1>
      <div class="scores">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">BEST</span>
          <span id="best">0</span>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="new-game">New Game</button>
    </div>
    <div class="grid-container">
      <div class="grid-background">
        <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
        <div class="grid-row"><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div></div>
      </div>
      <div class="tile-container" id="tile-container"></div>
    </div>
    <p class="instructions">Swipe or use arrow keys to move tiles. Reach <strong>2048!</strong></p>
  </div>
  <div id="game-over" class="overlay hidden">
    <div class="overlay-content">
      <h2 id="overlay-title">Game Over!</h2>
      <p id="overlay-score"></p>
      <button id="retry">Try Again</button>
    </div>
  </div>
  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
